<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tavion Thomas-Dominguez — Loading</title>
  <style>
    :root{
      --bg-1:#0f172a; /* rich navy */
      --bg-2:#071126; /* deeper */
      --accent:#7c3aed; /* purple */
      --accent-2:#06b6d4; /* teal */
      --glass: rgba(255,255,255,0.06);
      --text: #e6eef8;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      background: radial-gradient(1200px 600px at 10% 20%, rgba(124,58,237,0.12), transparent 8%),
                  radial-gradient(1000px 400px at 90% 80%, rgba(6,182,212,0.06), transparent 10%),
                  linear-gradient(180deg,var(--bg-1),var(--bg-2));
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .card{
      width:min(820px,92vw);
      max-width:820px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border-radius:16px;
      padding:36px;
      box-shadow:0 10px 30px rgba(2,6,23,0.6);
      border:1px solid rgba(255,255,255,0.03);
      text-align:center;
    }

    .title{
      font-size:22px;
      font-weight:700;
      letter-spacing:0.2px;
      margin:0 0 18px 0;
    }

    .subtitle{
      font-size:14px;
      margin:0 0 28px 0;
      opacity:0.85;
    }

    /* progress wrapper */
    .progress-wrap{
      width:100%;
      background:var(--glass);
      border-radius:12px;
      padding:10px;
      box-shadow: inset 0 -6px 18px rgba(0,0,0,0.6);
      position:relative;
      overflow:hidden;
    }

    .bar{
      height:28px;
      width:0%;
      border-radius:8px;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:12px;
      font-weight:600;
      transition:width 400ms cubic-bezier(.2,.9,.2,1);
      /* Rose gold metallic gradient inside black bar */
      background: linear-gradient(90deg, #000000, #b76e79, #e8c1c5, #b76e79, #000000);
    }

    /* animated stripes */
    

    @keyframes slideover{
      from{transform:translateX(-100%)}
      to{transform:translateX(0%)}
    }

    .bar .glow{ display:none; }

    .status{
      margin-top:14px;
      font-size:13px;
      color:rgba(230,238,248,0.85);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .percentage{
      font-variant-numeric:tabular-nums;
      font-weight:700;
    }

    /* small accent dot */
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow:0 6px 18px rgba(7,12,32,0.6);
    }

    /* subtle footer */
    .footer{
      margin-top:18px;
      font-size:12px;
      opacity:0.65;
    }

    /* finished state */
    .finished .bar{transition:width 700ms cubic-bezier(.2,.9,.2,1)}
    .finished .bar::before{animation-play-state:paused;opacity:0.6}

    /* responsive tweaks */
    @media (max-width:520px){
      .card{padding:22px}
      .title{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="card" role="region" aria-label="Loading screen">
    <h1 class="title">Tavion Thomas-Dominguez</h1>
    <p class="subtitle">Loading — please wait</p>

    <div class="progress-wrap" aria-hidden="false">
      <div id="bar" class="bar" style="width:0%" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" role="progressbar">
        <div class="glow"></div>
        <span id="label" style="position:relative;color:rgba(255,255,255,0.98);font-size:13px">0%</span>
      </div>
    </div>

    <div class="status" id="status"><div class="dot" aria-hidden="true"></div><div id="statustext">Initializing...</div></div>
    <div class="footer">A small animated loading intro for your GitHub Pages site.</div>
  </div>

  <script>
    // Simulated smart loader: progresses smoothly until window 'load' then finishes.
    (function(){
      const bar = document.getElementById('bar');
      const label = document.getElementById('label');
      const status = document.getElementById('statustext');
      let progress = 0;
      let ticking = false;

      // Step function that eases growth as time goes.
      function step() {
        if (progress >= 99) return; // wait for real load
        // incremental growth that slows down as it approaches 80-95
        const delta = 0.8 + Math.random()*2.4; // random pace
        progress = Math.min(99, progress + delta);
        render(progress);
      }

      function render(p){
        bar.style.width = p + '%';
        bar.setAttribute('aria-valuenow', Math.round(p));
        label.textContent = Math.round(p) + '%';
        if (p < 40) status.textContent = 'Fetching resources...';
        else if (p < 75) status.textContent = 'Almost there...';
        else status.textContent = 'Finalizing...';
      }

      // friendly interval while things are loading
      const interval = setInterval(step, 220);

      // when the page actually finishes loading, move to 100% and show finished state
      function done() {
        clearInterval(interval);
        // animate to 100%
        progress = 100;
        // add a class for finished visual tweaks
        document.querySelector('.card').classList.add('finished');
        render(progress);
        status.textContent = 'Loaded — welcome!';
        // subtle fade-out after a short delay (optional)
        setTimeout(()=>{
          // remove loader or keep visible based on preference. We'll keep it but reduce opacity.
          document.querySelector('.card').style.opacity = '0.98';
        }, 700);
      }

      // safety: if 'load' already fired (rare on GitHub pages for simple sites), call done immediately
      if (document.readyState === 'complete') {
        // small delay to let the user see the progress animation
        setTimeout(done, 450);
      } else {
        window.addEventListener('load', ()=>{
          // give tiny breathing room for the progress animation
          setTimeout(done, 300);
        });
      }

      // allow click to instantly finish (handy while testing)
      document.body.addEventListener('click', ()=>{
        if (progress < 100) done();
      });

      // initial render
      render(progress);
    })();
  </script>
</body>
</html>
